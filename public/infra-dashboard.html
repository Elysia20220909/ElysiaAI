<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elysia AI - InfraOps Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
      }
      .header {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
        text-align: center;
        position: relative;
      }
      .header h1 {
        color: #2b5876;
        font-size: 2.5em;
        margin-bottom: 10px;
      }
      .header p {
        color: #666;
        font-size: 1.1em;
      }
      .btn-nav {
        position: absolute;
        top: 30px;
        right: 30px;
        padding: 10px 20px;
        background: #2b5876;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: background 0.3s;
      }
      .btn-nav:hover {
        background: #1f4056;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
      }
      .stat-card {
        background: rgba(255, 255, 255, 0.95);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .stat-card:hover {
        transform: translateY(-5px);
      }
      .stat-card h3 {
        color: #666;
        font-size: 0.9em;
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .stat-card .value {
        font-size: 1.5em;
        font-weight: bold;
        color: #2b5876;
        text-align: center;
      }
      .status-dot {
        height: 15px;
        width: 15px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
      }
      .status-online { background-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
      .status-offline { background-color: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
      .status-unknown { background-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }
      .section {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
      }
      .section h2 {
        color: #2b5876;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .terminal-box {
        background: #1e1e1e;
        color: #00ff00;
        font-family: monospace;
        padding: 20px;
        border-radius: 8px;
        white-space: pre-wrap;
        overflow-x: auto;
        max-height: 400px;
        overflow-y: auto;
      }
      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>⚙️ InfraOps Dashboard</h1>
        <p>Proxmox VE & Bare-metal Management</p>
        <a href="/admin.html" class="btn-nav">Back to Admin</a>
      </div>

      <div class="stats-grid" id="server-status">
        <!-- Rendered via JS -->
      </div>

      <div class="section">
        <h2>🛠 Active Infrastructure Issues</h2>
        <div class="terminal-box" id="issues-box">Loading issues...</div>
      </div>

      <div class="section">
        <h2>🗄 LINSTOR Cluster Status</h2>
        <div class="terminal-box" id="linstor-box">Loading status...</div>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:3000";

      const servers = [
        { id: "server4", name: "4号機 (X11DPU)", config: "server4.yml" },
        { id: "server5", name: "5号機 (X11DPU)", config: "server5.yml" },
        { id: "server6", name: "6号機 (X11DPU)", config: "server6.yml" },
        { id: "server7", name: "7号機 (DELL R320)", config: "server7.yml" }
      ];

      // Refresh Power Status
      async function loadServerStatus() {
        const grid = document.getElementById("server-status");
        grid.innerHTML = servers.map(s => `
          <div class="stat-card" id="card-${s.id}">
            <h3>${s.name}</h3>
            <div class="value">
              <span class="status-dot status-unknown"></span> Check...
            </div>
          </div>
        `).join("");

        for (const s of servers) {
          try {
            const res = await fetch(`${API_BASE}/infra/status/${s.config}`);
            const data = await res.json();
            const output = data.stdout.toLowerCase();
            
            let statusHtml = "";
            if (output.includes("on") || output.includes("up")) {
              statusHtml = '<span class="status-dot status-online"></span> Power ON';
            } else if (output.includes("off") || output.includes("down")) {
              statusHtml = '<span class="status-dot status-offline"></span> Power OFF';
            } else {
              statusHtml = '<span class="status-dot status-unknown"></span> Unknown';
            }

            document.getElementById(`card-${s.id}`).querySelector('.value').innerHTML = statusHtml;
          } catch (e) {
            document.getElementById(`card-${s.id}`).querySelector('.value').innerHTML = 
              '<span class="status-dot status-offline"></span> Error';
          }
        }
      }

      // Load Issues
      async function loadIssues() {
        try {
          const res = await fetch(`${API_BASE}/infra/issues`);
          const data = await res.json();
          document.getElementById("issues-box").textContent = data.stdout || "No active issues.";
        } catch (e) {
          document.getElementById("issues-box").textContent = "Failed to load issues.";
        }
      }

      // Load LINSTOR
      async function loadLinstor() {
        try {
          const res = await fetch(`${API_BASE}/infra/linstor`);
          const data = await res.json();
          document.getElementById("linstor-box").textContent = data.stdout || data.stderr || "No LINSTOR data available.";
        } catch (e) {
          document.getElementById("linstor-box").textContent = "Failed to load LINSTOR status.";
        }
      }

      window.addEventListener("load", () => {
        loadServerStatus();
        loadIssues();
        loadLinstor();
      });
    </script>
  </body>
</html>
