<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エリシア - AI VTuber Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            height: 100vh;
        }

        .avatar-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
        }

        .avatar-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #f5e6f0 0%, #e6d9f0 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
        }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .avatar-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.1));
            position: relative;
            z-index: 2;
        }

        .chat-panel {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-height: 100vh;
        }

        .chat-header {
            background: linear-gradient(135deg, #DDA0DD 0%, #FF69B4 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h1 {
            font-size: 24px;
            font-weight: bold;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff6b6b;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #4ade80;
        }

        .user-count {
            font-size: 12px;
            color: #666;
            margin-left: auto;
            padding: 0 10px;
        }

        .typing-users {
            font-size: 11px;
            color: #999;
            font-style: italic;
            margin-top: 5px;
            min-height: 16px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                /* ストリーミングコントロールパネル */
                .streaming-panel {
                    background: linear-gradient(135deg, rgba(31, 41, 55, 0.9) 0%, rgba(17, 24, 39, 0.95) 100%);
                    border: 1px solid rgba(239, 68, 68, 0.3);
                    border-radius: 10px;
                    padding: 12px;
                    margin-bottom: 12px;
                    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
                }

                .streaming-header {
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    margin-bottom: 10px;
                }

                .streaming-status {
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    font-weight: bold;
                    color: #9ca3af;
                    font-size: 14px;
                }

                .streaming-status.streaming {
                    color: #ef4444;
                }

                .streaming-stats {
                    display: flex;
                    gap: 12px;
                    font-size: 12px;
                    color: #6b7280;
                }

                .streaming-controls {
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                }

                .control-row {
                    display: flex;
                    gap: 8px;
                }

                .control-input {
                    flex: 1;
                    padding: 8px;
                    background-color: rgba(55, 65, 81, 0.5);
                    border: 1px solid rgba(107, 114, 128, 0.3);
                    border-radius: 6px;
                    color: #e5e7eb;
                    font-size: 12px;
                }

                .control-input:disabled {
                    opacity: 0.5;
                    cursor: not-allowed;
                }

                .control-button {
                    padding: 8px 12px;
                    background-color: rgba(34, 197, 94, 0.2);
                    border: 1px solid rgba(34, 197, 94, 0.3);
                    border-radius: 6px;
                    color: #86efac;
                    font-size: 12px;
                    font-weight: bold;
                    cursor: pointer;
                    transition: all 0.3s;
                }

                .control-button:hover {
                    background-color: rgba(34, 197, 94, 0.3);
                    border-color: rgba(34, 197, 94, 0.5);
                }

                .control-button.active {
                    background-color: rgba(239, 68, 68, 0.2);
                    border-color: rgba(239, 68, 68, 0.5);
                    color: #fca5a5;
                }

                .control-button.obs-btn {
                    background-color: rgba(168, 85, 247, 0.2);
                    border-color: rgba(168, 85, 247, 0.3);
                    color: #e9d5ff;
                }

                .control-button.obs-btn:hover {
                    background-color: rgba(168, 85, 247, 0.3);
                    border-color: rgba(168, 85, 247, 0.5);
                }

                .bitrate-controls {
                    display: flex;
                    gap: 8px;
                    font-size: 12px;
                }

                .bitrate-controls label {
                    flex: 1;
                    display: flex;
                    align-items: center;
                    gap: 4px;
                    color: #d1d5db;
                }

                .bitrate-controls input {
                    width: 50px;
                    padding: 4px;
                    background-color: rgba(55, 65, 81, 0.5);
                    border: 1px solid rgba(107, 114, 128, 0.3);
                    border-radius: 4px;
                    color: #e5e7eb;
                    font-size: 11px;
                }

                .streaming-toggle-btn {
                    background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
                    color: white;
                    border: none;
                    padding: 8px 12px;
                    border-radius: 6px;
                    cursor: pointer;
                    font-size: 14px;
                    transition: transform 0.2s;
                    margin-left: 4px;
                }

                .streaming-toggle-btn:hover {
                    transform: scale(1.05);
                }
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
            font-size: 14px;
        }

        .message.assistant .message-bubble {
            background: #FFB6C1;
            color: #333;
            border-bottom-left-radius: 0;
        }

        .message.user .message-bubble {
            background: #DDA0DD;
            color: white;
            border-bottom-right-radius: 0;
        }

        .message-meta {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .input-area {
            background: white;
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 20px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .input-area input:focus {
            outline: none;
            border-color: #DDA0DD;
        }

        .input-area button {
            background: linear-gradient(135deg, #DDA0DD 0%, #FF69B4 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .input-area button:hover {
            transform: scale(1.05);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        .voice-button {
            background: linear-gradient(135deg, #FF69B4 0%, #FFB6C1 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: transform 0.2s;
            margin-left: 5px;
        }

        .voice-button:hover {
            transform: scale(1.05);
        }

        .voice-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .audio-player {
            margin: 10px 0;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 10px;
        }

        .lipsync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .mouth-shape {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #FF69B4;
            border-radius: 50%;
            animation: lipsync 0.3s ease;
        }

        @keyframes lipsync {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .emotion-indicator {
            font-size: 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #DDA0DD;
            animation: bounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                opacity: 0.5;
                transform: translateY(0);
            }
            40% {
                opacity: 1;
                transform: translateY(-10px);
            }
        }

        /* Advanced Animation Keyframes */
        @keyframes blink {
            0%, 90%, 100% { height: 20px; }
            95% { height: 2px; }
        }

        @keyframes nod {
            0%, 100% { transform: rotateX(0deg); }
            25% { transform: rotateX(-15deg); }
            75% { transform: rotateX(15deg); }
        }

        @keyframes headShake {
            0%, 100% { transform: rotateY(0deg); }
            25% { transform: rotateY(-10deg); }
            75% { transform: rotateY(10deg); }
        }

        @keyframes earTwitch {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(-5deg); }
        }

        @keyframes tailWagGentle {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(8deg); }
        }

        @keyframes tailWagHappy {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-20deg); }
            75% { transform: rotate(20deg); }
        }

        @keyframes blush {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.7; }
        }

        @keyframes eyeGaze {
            0%, 100% { cx: 172px; }
            50% { cx: 168px; }
        }

        @keyframes eyeGazeRight {
            0%, 100% { cx: 232px; }
            50% { cx: 236px; }
        }

        @keyframes sweat {
            0%, 100% { opacity: 0; transform: translateY(-5px); }
            50% { opacity: 1; transform: translateY(0); }
        }

        @keyframes spiralEyes {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .avatar-panel {
                order: 2;
            }

            .chat-panel {
                order: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container" x-data="elisiaChat()">
        <!-- Avatar Panel -->
        <div class="avatar-panel">
            <div class="emotion-indicator" x-text="emotionEmoji()"></div>

            <div class="avatar-container">
                <svg class="avatar-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background -->
                    <rect width="400" height="400" fill="#f5e6f0" />

                    <!-- Body Group (animated based on emotion) -->
                    <g :class="`animate-${currentEmotion}`">
                        <!-- Neck -->
                        <rect x="175" y="240" width="50" height="40" fill="#FFD4B8" rx="10" />

                        <!-- Body/Dress -->
                        <ellipse cx="200" cy="320" rx="80" ry="60" fill="#DDA0DD" />
                        <rect x="130" y="280" width="140" height="80" fill="#DDA0DD" rx="10" />

                        <!-- Arms -->
                        <rect x="60" y="280" width="40" height="90" fill="#FFD4B8" rx="20" />
                        <rect x="300" y="280" width="40" height="90" fill="#FFD4B8" rx="20" />

                        <!-- Hand circles -->
                        <circle cx="80" cy="375" r="15" fill="#FFD4B8" />
                        <circle cx="320" cy="375" r="15" fill="#FFD4B8" />
                    </g>

                    <!-- Head -->
                    <circle cx="200" cy="150" r="70" fill="#FFD4B8" />

                    <!-- Hair -->
                    <path d="M 130 120 Q 130 40 200 30 Q 270 40 270 120" fill="#FF6B9D" />

                    <!-- Fox Ears -->
                    <g x-show="hasEars">
                        <!-- Left ear -->
                        <polygon points="120,100 100,40 140,80" fill="#FF6B9D" />
                        <polygon points="125,90 115,65 135,80" fill="#FFB6C1" />

                        <!-- Right ear -->
                        <polygon points="280,100 300,40 260,80" fill="#FF6B9D" />
                        <polygon points="275,90 285,65 265,80" fill="#FFB6C1" />
                    </g>

                    <!-- Eyes (changes based on emotion) -->
                    <g x-show="currentEmotion === 'joy'">
                        <!-- Happy eyes -->
                        <circle cx="170" cy="140" r="10" fill="#4B0082" />
                        <circle cx="230" cy="140" r="10" fill="#4B0082" />
                        <path d="M 165 145 Q 170 150 175 145" stroke="#4B0082" stroke-width="2" fill="none" />
                        <path d="M 225 145 Q 230 150 235 145" stroke="#4B0082" stroke-width="2" fill="none" />
                        <!-- Blush on cheeks -->
                        <circle cx="130" cy="160" r="15" fill="#FFB6C1" opacity="0.4" />
                        <circle cx="270" cy="160" r="15" fill="#FFB6C1" opacity="0.4" />
                    </g>

                    <g x-show="currentEmotion === 'sadness'">
                        <!-- Sad eyes with tears -->
                        <circle cx="170" cy="135" r="10" fill="#4B0082" />
                        <circle cx="230" cy="135" r="10" fill="#4B0082" />
                        <path d="M 165 150 Q 170 145 175 150" stroke="#4B0082" stroke-width="2" fill="none" />
                        <path d="M 225 150 Q 230 145 235 150" stroke="#4B0082" stroke-width="2" fill="none" />
                        <!-- Tears -->
                        <circle cx="168" cy="152" r="3" fill="#87CEEB" :style="{animation: 'sweat 1.5s ease-in-out infinite'}" />
                        <circle cx="232" cy="152" r="3" fill="#87CEEB" :style="{animation: 'sweat 1.5s ease-in-out infinite'}" />
                    </g>

                    <g x-show="currentEmotion === 'anger'">
                        <!-- Angry eyes -->
                        <circle cx="170" cy="140" r="10" fill="#4B0082" />
                        <circle cx="230" cy="140" r="10" fill="#4B0082" />
                        <!-- Angry eyebrows -->
                        <path d="M 155 125 L 185 120" stroke="#FF6B9D" stroke-width="3" stroke-linecap="round" />
                        <path d="M 245 120 L 215 125" stroke="#FF6B9D" stroke-width="3" stroke-linecap="round" />
                    </g>

                    <g x-show="currentEmotion === 'surprise'">
                        <!-- Surprised eyes (big) -->
                        <circle cx="170" cy="140" r="14" fill="#4B0082" />
                        <circle cx="230" cy="140" r="14" fill="#4B0082" />
                        <circle cx="172" cy="138" r="7" fill="white" />
                        <circle cx="232" cy="138" r="7" fill="white" />
                    </g>

                    <g x-show="currentEmotion === 'confusion'">
                        <!-- Confused eyes (one up, one down) -->
                        <circle cx="170" cy="135" r="10" fill="#4B0082" />
                        <circle cx="230" cy="145" r="10" fill="#4B0082" />
                        <!-- Question mark eyebrow -->
                        <path d="M 200 115 Q 210 110 210 120" stroke="#FF6B9D" stroke-width="2" fill="none" stroke-linecap="round" />
                    </g>

                    <g x-show="!['joy', 'sadness', 'anger', 'surprise', 'confusion'].includes(currentEmotion)">
                        <!-- Normal eyes -->
                        <circle cx="170" cy="140" r="10" fill="#4B0082" />
                        <circle cx="230" cy="140" r="10" fill="#4B0082" />
                        <circle cx="172" cy="138" r="5" fill="white" />
                        <circle cx="232" cy="138" r="5" fill="white" />
                    </g>

                    <!-- Blinking animation (for neutral state) -->
                    <g x-show="currentEmotion === 'neutral'" :style="{animation: 'blink 4s ease-in-out infinite'}">
                        <line x1="165" y1="140" x2="175" y2="140" stroke="#4B0082" stroke-width="2" />
                        <line x1="225" y1="140" x2="235" y2="140" stroke="#4B0082" stroke-width="2" />
                    </g>

                    <!-- Mouth (changes based on emotion) -->
                    <g x-show="currentEmotion === 'joy'">
                        <path d="M 190 170 Q 200 185 210 170" stroke="#FF1493" stroke-width="3" fill="none" stroke-linecap="round" />
                    </g>

                    <g x-show="currentEmotion === 'sadness'">
                        <path d="M 190 175 Q 200 165 210 175" stroke="#FF1493" stroke-width="3" fill="none" stroke-linecap="round" />
                    </g>

                    <g x-show="currentEmotion === 'anger'">
                        <!-- Straight angry mouth -->
                        <line x1="190" y1="175" x2="210" y2="175" stroke="#FF1493" stroke-width="3" stroke-linecap="round" />
                    </g>

                    <g x-show="currentEmotion === 'surprise'">
                        <!-- O-mouth -->
                        <circle cx="200" cy="175" r="12" fill="none" stroke="#FF1493" stroke-width="2" />
                    </g>

                    <g x-show="currentEmotion === 'confusion'">
                        <!-- Tilted mouth -->
                        <path d="M 190 172 Q 200 178 210 175" stroke="#FF1493" stroke-width="3" fill="none" stroke-linecap="round" />
                    </g>

                    <g x-show="!['joy', 'sadness', 'anger', 'surprise', 'confusion'].includes(currentEmotion)">
                        <ellipse cx="200" cy="175" rx="12" ry="8" fill="#FF1493" />
                    </g>

                    <!-- Sweat drops (for confusion/shock) -->
                    <g x-show="currentEmotion === 'confusion'" :style="{animation: 'sweat 1s ease-in-out infinite'}">
                        <circle cx="250" cy="110" r="4" fill="#87CEEB" opacity="0.6" />
                    </g>

                    <g x-show="currentEmotion === 'surprise'" :style="{animation: 'sweat 0.8s ease-in-out infinite'}">
                        <circle cx="250" cy="110" r="4" fill="#87CEEB" opacity="0.6" />
                        <circle cx="150" cy="110" r="4" fill="#87CEEB" opacity="0.6" />
                    </g>

                    <!-- Spiral eyes (dizzy) - optional extreme emotion -->
                    <g x-show="currentEmotion === 'dizzy'" :style="{animation: 'spiralEyes 2s linear infinite'}">
                        <g>
                            <circle cx="170" cy="140" r="3" fill="none" stroke="#4B0082" stroke-width="1" />
                            <circle cx="170" cy="140" r="6" fill="none" stroke="#4B0082" stroke-width="1" />
                            <circle cx="230" cy="140" r="3" fill="none" stroke="#4B0082" stroke-width="1" />
                            <circle cx="230" cy="140" r="6" fill="none" stroke="#4B0082" stroke-width="1" />
                        </g>
                    </g>

                    <!-- Tail (animated wag) -->
                    <g x-show="hasTail" :class="{'animate-wag': isIdle}">
                        <path d="M 130 300 Q 60 280 50 200" stroke="#FF6B9D" stroke-width="25" fill="none" stroke-linecap="round" />
                        <path d="M 135 310 Q 65 295 55 215" stroke="#FFB6C1" stroke-width="15" fill="none" stroke-linecap="round" />
                    </g>
                </svg>
                <div class="avatar-overlay" id="three-overlay"></div>
            </div>

            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-800" x-text="characterName"></h2>
                <p class="text-sm text-gray-600 mt-2" x-text="characterDescription"></p>
            </div>
        </div>

        <!-- Chat Panel -->
        <div class="chat-panel">
            <div class="chat-header">
                <h1>💬 Chat</h1>
                <div class="status-indicator">
                    <div class="status-dot" :class="{'connected': connectionStatus === 'Online'}"></div>
                    <span x-text="connectionStatus"></span>
                </div>
                <div class="user-count" x-show="useWebSocket">
                    👥 <span x-text="connectedUsers"></span>
                </div>
            </div>

            <div class="messages-area" @scroll="onMessagesScroll()">
                <template x-for="(msg, idx) in messages" :key="idx">
                    <div :class="`message ${msg.role}`">
                        <div class="message-bubble" x-html="msg.content"></div>
                    </div>
                </template>

                <template x-if="isTyping">
                    <div class="message assistant">
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </template>
            </div>

            <!-- ストリーミングコントロールパネル -->
            <div class="streaming-panel" x-show="showStreamingPanel">
                <div class="streaming-header">
                    <div class="streaming-status" :class="{'streaming': isStreaming}">
                        <span x-text="isStreaming ? '🔴 配信中' : '⚫ オフライン'"></span>
                    </div>
                    <div class="streaming-stats" x-show="isStreaming">
                        <span x-text="`${streamStatus.frameCount} frames`"></span>
                        <span x-text="`${(streamStatus.bitrate || 0).toFixed(0)} kbps`"></span>
                    </div>
                </div>

                <div class="streaming-controls">
                    <div class="control-row">
                        <input type="text"
                               x-model="streamConfig.rtmpUrl"
                               placeholder="rtmp://localhost:1935/live"
                               class="control-input"
                               :disabled="isStreaming" />
                        <input type="text"
                               x-model="streamConfig.streamKey"
                               placeholder="stream-key"
                               class="control-input"
                               :disabled="isStreaming" />
                    </div>

                    <div class="control-row">
                        <button @click="toggleStreaming()"
                            :class="{'active': isStreaming}"
                            class="control-button"
                            title="配信を開始/停止">
                            <span x-text="isStreaming ? '■ 停止' : '● 開始'"></span>
                        </button>
                        <button @click="exportOBSConfig()" class="control-button obs-btn" title="OBS 設定をエクスポート">📋 OBS</button>
                    </div>

                    <div class="control-row bitrate-controls">
                        <label>
                            Bitrate:
                            <input type="number"
                                   x-model.number="streamConfig.bitrate"
                                   min="500"
                                   max="10000"
                                   :disabled="isStreaming" />
                        </label>
                        <label>
                            FPS:
                            <input type="number"
                                   x-model.number="streamConfig.fps"
                                   min="15"
                                   max="60"
                                   :disabled="isStreaming" />
                        </label>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <input
                    type="text"
                    placeholder="メッセージを入力..."
                    @keydown.enter="sendMessage()"
                    x-model="userInput"
                    :disabled="isTyping"
                />
                <button @click="sendMessage()" :disabled="isTyping || !userInput.trim()">
                    送信
                </button>
                <button @click="toggleStreamingPanel()" title="配信パネルを表示/非表示" class="streaming-toggle-btn">
                    📺
                </button>
                <button class="voice-button" @click="synthesizeLastMessage()" :disabled="isTyping || messages.length === 0" title="最後のメッセージを音声化">
                    🔊
                </button>
            </div>
        </div>
    </div>

    <script>
        function elisiaChat() {
            return {
                characterName: 'エリシア ♡',
                characterDescription: 'フォックスガール AI VTuber',
                hasEars: true,
                hasTail: true,
                connectionStatus: 'Online',
                useWebSocket: true,
                wsConnection: null,
                connectedUsers: 0,
                typingUsers: [],
                userId: `user-${Math.random().toString(36).substr(2, 9)}`,
                username: `ゲスト${Math.floor(Math.random() * 10000)}`,
                isSynthesizing: false,
                currentAudio: null,
                // ストリーミング関連プロパティ
                isStreaming: false,
                showStreamingPanel: false,
                streamConfig: {
                    rtmpUrl: 'rtmp://localhost:1935/live',
                    streamKey: `elisia-${Date.now()}`,
                    bitrate: 2500,
                    fps: 30,
                    resolution: '720p'
                },
                streamStatus: {
                    frameCount: 0,
                    bitrate: 0,
                    uptime: 0
                },
                streamingCanvas: null,
                mediaRecorder: null,
                messages: [
                    {
                        role: 'assistant',
                        content: 'にゃん♪ こんにちは！エリシアだよぉ〜 何かお話ししたいことある？'
                    }
                ],
                userInput: '',
                isTyping: false,
                currentEmotion: 'neutral',
                isIdle: false,
                emotionEmoji() {
                    const emojiMap = {
                        joy: '😊',
                        sadness: '😢',
                        anger: '😠',
                        surprise: '😲',
                        neutral: '😊',
                        confusion: '🤔'
                    };
                    return emojiMap[this.currentEmotion] || '😊';
                },
                async sendMessage() {
                    if (!this.userInput.trim()) return;

                    // ユーザーメッセージ追加
                    this.messages.push({
                        role: 'user',
                        content: this.userInput
                    });

                    const userMessage = this.userInput;
                    this.userInput = '';
                    this.isTyping = true;

                    // 感情推定
                    this.detectEmotion(userMessage);

                    try {
                        // WebSocket が利用可能か確認
                        if (this.useWebSocket && this.wsConnection && this.wsConnection.readyState === WebSocket.OPEN) {
                            // WebSocket 経由でメッセージ送信
                            this.wsConnection.send(JSON.stringify({
                                type: 'chat',
                                userId: this.userId,
                                username: this.username,
                                content: userMessage,
                                emotion: this.currentEmotion
                            }));
                        } else {
                            // REST API にフォールバック
                            const response = await fetch('/elysia-love', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${this.getAuthToken()}`
                                },
                                body: JSON.stringify({
                                    messages: this.messages.map(m => ({
                                        role: m.role,
                                        content: m.content
                                    })),
                                    useEnsemble: true
                                })
                            });

                            if (!response.ok) {
                                throw new Error(`API Error: ${response.status}`);
                            }

                            const data = await response.json();
                            this.messages.push({
                                role: 'assistant',
                                content: data.reply || 'ごめんなさい、何か起きちゃった...'
                            });

                            // アバター感情更新
                            this.currentEmotion = data.emotion || 'neutral';
                        }

                    } catch (error) {
                        console.error('Chat error:', error);
                        this.messages.push({
                            role: 'assistant',
                            content: 'あ、ちょっと調子が悪いみたい...ごめんなさい。'
                        });
                        this.currentEmotion = 'sadness';
                    } finally {
                        this.isTyping = false;
                        this.scrollToBottom();
                    }
                },
                detectEmotion(text) {
                    // 簡易感情検出ロジック
                    const joyPatterns = [/(^|\\s)(楽しい|嬉しい|凄い|素晴らしい|最高|♡|♪)($|\\s)/i];
                    const sadPatterns = [/(悲しい|つらい|悔しい|ショック|😢)/i];
                    const angerPatterns = [/(怒|ムカ|イライラ|😠)/i];
                    const surprisePatterns = [/(驚いた|びっくり|えっ|😲)/i];
                    const confusionPatterns = [/(わからない|不明|？|何|どうして|なぜ|理解できない)/i];

                    if (joyPatterns.some(p => p.test(text))) {
                        this.currentEmotion = 'joy';
                        this.performGesture('happy_jump');
                    } else if (sadPatterns.some(p => p.test(text))) {
                        this.currentEmotion = 'sadness';
                        this.performGesture('sad_droop');
                    } else if (angerPatterns.some(p => p.test(text))) {
                        this.currentEmotion = 'anger';
                        this.performGesture('headShake');
                    } else if (surprisePatterns.some(p => p.test(text))) {
                        this.currentEmotion = 'surprise';
                        this.performGesture('surprise');
                    } else if (confusionPatterns.some(p => p.test(text))) {
                        this.currentEmotion = 'confusion';
                        this.performGesture('nod');
                    } else {
                        this.currentEmotion = 'neutral';
                    }
                },
                performGesture(gestureType) {
                    // ジェスチャ実行
                    switch (gestureType) {
                        case 'nod':
                            this.animateNod();
                            break;
                        case 'headShake':
                            this.animateHeadShake();
                            break;
                        case 'happy_jump':
                            this.animateHappyJump();
                            break;
                        case 'sad_droop':
                            this.animateSadDroop();
                            break;
                        case 'surprise':
                            this.animateSurprise();
                            break;
                        case 'earTwitch':
                            this.animateEarTwitch();
                            break;
                        default:
                            this.animateWave();
                    }
                },
                animateNod() {
                    const avatar = document.querySelector('.avatar-svg');
                    if (avatar) {
                        avatar.style.animation = 'nod 0.8s ease-in-out';
                        setTimeout(() => { avatar.style.animation = ''; }, 800);
                    }
                },
                animateHeadShake() {
                    const avatar = document.querySelector('.avatar-svg');
                    if (avatar) {
                        avatar.style.animation = 'headShake 0.6s ease-in-out';
                        setTimeout(() => { avatar.style.animation = ''; }, 600);
                    }
                },
                animateHappyJump() {
                    const avatar = document.querySelector('.avatar-svg');
                    if (avatar) {
                        avatar.style.animation = 'bounce 0.6s ease-in-out';
                        setTimeout(() => { avatar.style.animation = ''; }, 600);
                    }
                },
                animateSadDroop() {
                    const avatar = document.querySelector('.avatar-svg');
                    if (avatar) {
                        avatar.style.transform = 'scaleY(0.95)';
                        setTimeout(() => { avatar.style.transform = ''; }, 1000);
                    }
                },
                animateSurprise() {
                    const avatar = document.querySelector('.avatar-svg');
                    if (avatar) {
                        // 複数の瞬きで驚きを表現
                        avatar.style.animation = 'blink 0.3s ease-in-out 2';
                        setTimeout(() => { avatar.style.animation = ''; }, 600);
                    }
                },
                animateEarTwitch() {
                    const ears = document.querySelector('g[x-show="hasEars"]');
                    if (ears) {
                        ears.style.animation = 'earTwitch 0.4s ease-in-out';
                        setTimeout(() => { ears.style.animation = ''; }, 400);
                    }
                },
                animateWave() {
                    const avatar = document.querySelector('.avatar-svg');
                    if (avatar) {
                        avatar.style.animation = 'sway 0.5s ease-in-out';
                        setTimeout(() => { avatar.style.animation = ''; }, 500);
                    }
                },
                scrollToBottom() {
                    this.$nextTick(() => {
                        const messagesArea = document.querySelector('.messages-area');
                        messagesArea.scrollTop = messagesArea.scrollHeight;
                    });
                },
                onMessagesScroll() {
                    // スクロール処理
                },
                getAuthToken() {
                    // ローカルストレージからトークン取得
                    return localStorage.getItem('auth_token') || '';
                },
                async synthesizeLastMessage() {
                    if (this.isSynthesizing || this.messages.length === 0) return;

                    // 最後のアシスタントメッセージを取得
                    let lastMessage = null;
                    for (let i = this.messages.length - 1; i >= 0; i--) {
                        if (this.messages[i].role === 'assistant') {
                            lastMessage = this.messages[i].content;
                            break;
                        }
                    }

                    if (!lastMessage) return;

                    this.isSynthesizing = true;

                    try {
                        // 音声合成 API 呼び出し
                        const response = await fetch('/elisia/voice/synthesize', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${this.getAuthToken()}`
                            },
                            body: JSON.stringify({
                                text: lastMessage,
                                speakerId: 2,
                                speed: 1.2,
                                pitch: 1.15
                            })
                        });

                        if (!response.ok) {
                            throw new Error(`Synthesis API Error: ${response.status}`);
                        }

                        const data = await response.json();

                        if (data.ok && data.audioUrl) {
                            // 音声ファイル URL から WAV データ取得
                            const audioResponse = await fetch(data.audioUrl);
                            const audioBuffer = await audioResponse.arrayBuffer();

                            // Web Audio Context で再生
                            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                            const decodedData = await audioContext.decodeAudioData(audioBuffer);
                            const source = audioContext.createBufferSource();
                            source.buffer = decodedData;
                            source.connect(audioContext.destination);

                            // リップシンク再生を開始
                            this.playLipSync(data.lipsync_data, data.durationMs);

                            // 音声再生
                            source.start(0);
                        }
                    } catch (error) {
                        console.error('Voice synthesis error:', error);
                        this.currentEmotion = 'sadness';
                    } finally {
                        this.isSynthesizing = false;
                    }
                },
                playLipSync(lipSyncData, durationMs) {
                    if (!lipSyncData || lipSyncData.length === 0) return;

                    let currentIndex = 0;
                    const startTime = Date.now();

                    const updateMouth = () => {
                        const elapsed = Date.now() - startTime;

                        if (elapsed >= durationMs) {
                            // 再生終了
                            this.currentEmotion = 'neutral';
                            return;
                        }

                        // 現在のリップシンクデータを取得
                        while (
                            currentIndex < lipSyncData.length - 1 &&
                            lipSyncData[currentIndex + 1].timestamp <= elapsed
                        ) {
                            currentIndex++;
                        }

                        const frame = lipSyncData[currentIndex];
                        if (frame) {
                            // 口の開き度に基づいて感情を更新（可視化）
                            if (frame.mouthOpen > 0.7) {
                                this.currentEmotion = 'joy';
                            } else if (frame.mouthOpen < 0.3) {
                                this.currentEmotion = 'neutral';
                            }
                        }

                        requestAnimationFrame(updateMouth);
                    };

                    updateMouth();
                },
                initializeWebSocket() {
                    if (!this.useWebSocket) return;

                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const wsUrl = `${protocol}//${window.location.host}/elisia-chat/ws?userId=${this.userId}&username=${encodeURIComponent(this.username)}`;

                    try {
                        this.wsConnection = new WebSocket(wsUrl);

                        this.wsConnection.onopen = () => {
                            console.log('✅ WebSocket connected');
                            this.connectionStatus = 'Online';
                        };

                        this.wsConnection.onmessage = (event) => {
                            try {
                                const data = JSON.parse(event.data);

                                switch (data.type) {
                                    case 'message':
                                        // メッセージ受信
                                        this.messages.push({
                                            role: data.data.userId === 'elisia-system' ? 'assistant' : 'user',
                                            content: data.data.content
                                        });
                                        if (data.data.emotion) {
                                            this.currentEmotion = data.data.emotion;
                                        }
                                        this.isTyping = false;
                                        this.scrollToBottom();
                                        break;

                                    case 'user_list':
                                        // ユーザーリスト更新
                                        this.connectedUsers = data.data.count;
                                        break;

                                    case 'user_joined':
                                        // ユーザー参加通知
                                        this.connectedUsers++;
                                        console.log(`👋 ${data.data.username} がチャットに参加しました`);
                                        break;

                                    case 'user_left':
                                        // ユーザー退出通知
                                        this.connectedUsers = Math.max(0, this.connectedUsers - 1);
                                        console.log(`👋 ${data.data.username} がチャットを退出しました`);
                                        break;

                                    case 'typing':
                                        // タイピング中通知
                                        if (data.data.isTyping) {
                                            if (!this.typingUsers.includes(data.data.username)) {
                                                this.typingUsers.push(data.data.username);
                                            }
                                        } else {
                                            this.typingUsers = this.typingUsers.filter(
                                                u => u !== data.data.username
                                            );
                                        }
                                        break;

                                    case 'history':
                                        // メッセージ履歴
                                        this.messages = data.data.map(msg => ({
                                            role: msg.userId === 'elisia-system' ? 'assistant' : 'user',
                                            content: msg.content
                                        }));
                                        this.scrollToBottom();
                                        break;

                                    case 'error':
                                        console.error('WebSocket error:', data.data.message);
                                        break;
                                }
                            } catch (error) {
                                console.error('Message parsing error:', error);
                            }
                        };

                        this.wsConnection.onerror = (error) => {
                            console.error('❌ WebSocket error:', error);
                            this.connectionStatus = 'Offline';
                        };

                        this.wsConnection.onclose = () => {
                            console.log('❌ WebSocket disconnected');
                            this.connectionStatus = 'Offline';
                            // 再接続を試みる（3秒後）
                            setTimeout(() => {
                                this.initializeWebSocket();
                            }, 3000);
                        };
                    } catch (error) {
                        console.error('WebSocket initialization error:', error);
                        this.useWebSocket = false;
                    }
                },
                toggleStreamingPanel() {
                    this.showStreamingPanel = !this.showStreamingPanel;
                },
                async toggleStreaming() {
                    if (this.isStreaming) {
                        this.stopStreaming();
                    } else {
                        await this.startStreaming();
                    }
                },
                async startStreaming() {
                    if (!this.streamConfig.rtmpUrl || !this.streamConfig.streamKey) {
                        alert('RTMP URL と Stream Key を入力してください');
                        return;
                    }

                    try {
                        console.log('🎬 配信を開始します...');
                        this.isStreaming = true;

                        // 1. 画面共有で映像を取得（シンプルかつ高互換）
                        const displayStream = await navigator.mediaDevices.getDisplayMedia({
                            video: {
                                frameRate: this.streamConfig.fps,
                                width: this.streamConfig.resolution === '1080p' ? 1920 : this.streamConfig.resolution === '480p' ? 854 : 1280,
                                height: this.streamConfig.resolution === '1080p' ? 1080 : this.streamConfig.resolution === '480p' ? 480 : 720,
                            },
                            audio: true,
                        });

                        // 2. MediaRecorder を作成
                        const mimeType = this.getSupportedMimeType();
                        const options = {
                            mimeType: mimeType,
                            videoBitsPerSecond: this.streamConfig.bitrate * 1000
                        };

                        this.mediaRecorder = new MediaRecorder(displayStream, options);

                        // フレームデータ送信
                        this.mediaRecorder.ondataavailable = async (event) => {
                            if (event.data.size > 0 && this.isStreaming) {
                                try {
                                    const response = await fetch('/stream/whip', {
                                        method: 'POST',
                                        headers: {
                                            'X-Stream-Key': this.streamConfig.streamKey
                                        },
                                        body: event.data
                                    });

                                    if (response.ok) {
                                        const result = await response.json();
                                        this.streamStatus.frameCount = result.frameCount;
                                        this.streamStatus.bitrate = this.streamConfig.bitrate;
                                    }
                                } catch (error) {
                                    console.error('Stream upload error:', error);
                                }
                            }
                        };

                        this.mediaRecorder.onstop = () => {
                            displayStream.getTracks().forEach(track => track.stop());
                            this.isStreaming = false;
                        };

                        // 1 秒間隔でフレームを送信
                        this.mediaRecorder.start(1000);
                        console.log('🎥 配信開始:', `${this.streamConfig.rtmpUrl}/${this.streamConfig.streamKey}`);
                    } catch (error) {
                        console.error('Stream start error:', error);
                        alert(`配信開始エラー: ${error.message}`);
                        this.isStreaming = false;
                    }
                },
                stopStreaming() {
                    if (!this.mediaRecorder) return;

                    try {
                        console.log('🛑 配信を停止します...');
                        this.mediaRecorder.stop();
                        this.isStreaming = false;

                        // トラック停止
                        const stream = this.mediaRecorder.stream;
                        if (stream) {
                            stream.getTracks().forEach(track => track.stop());
                        }

                        console.log('✅ 配信停止完了');
                    } catch (error) {
                        console.error('Stream stop error:', error);
                    }
                },
                getSupportedMimeType() {
                    const types = [
                        'video/webm;codecs=vp9,opus',
                        'video/webm;codecs=vp8,opus',
                        'video/webm;codecs=h264,opus',
                        'video/webm'
                    ];

                    for (const type of types) {
                        if (MediaRecorder.isTypeSupported(type)) {
                            return type;
                        }
                    }

                    return '';
                },
                async exportOBSConfig() {
                    try {
                        const response = await fetch(
                            `/stream/obs-config?streamKey=${encodeURIComponent(this.streamConfig.streamKey)}`
                        );
                        const data = await response.json();

                        // JSON をダウンロード
                        const blob = new Blob([JSON.stringify(data.obsConfig, null, 2)],
                            { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `elisia-obs-config-${Date.now()}.json`;
                        a.click();
                        URL.revokeObjectURL(url);

                        console.log('📋 OBS 設定をダウンロードしました');
                    } catch (error) {
                        console.error('OBS config export error:', error);
                        alert('OBS 設定エクスポートに失敗しました');
                    }
                }
            };
        }

        // Three.js でアバター背景に立体エフェクトを追加
        function initThreeOverlay() {
            if (!window.THREE) return;
            const container = document.getElementById('three-overlay');
            if (!container) return;

            const width = container.clientWidth || 400;
            const height = container.clientHeight || 400;

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio || 1);
            container.appendChild(renderer.domElement);

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
            camera.position.set(0, 0, 4);

            const light = new THREE.PointLight(0xffffff, 1.2);
            light.position.set(2, 2, 4);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x88aaff, 0.6));

            const geometry = new THREE.TorusKnotGeometry(1, 0.25, 120, 16);
            const material = new THREE.MeshStandardMaterial({
                color: 0xff6bd6,
                metalness: 0.25,
                roughness: 0.35,
                emissive: 0x111133,
            });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const particles = [];
            const particleGeo = new THREE.IcosahedronGeometry(0.08, 0);
            const particleMat = new THREE.MeshStandardMaterial({
                color: 0x9ad5ff,
                transparent: true,
                opacity: 0.8,
            });
            for (let i = 0; i < 10; i++) {
                const p = new THREE.Mesh(particleGeo, particleMat.clone());
                p.position.set(
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 2
                );
                particles.push(p);
                scene.add(p);
            }

            const clock = new THREE.Clock();
            function animate() {
                requestAnimationFrame(animate);
                const t = clock.getElapsedTime();
                mesh.rotation.x = t * 0.4;
                mesh.rotation.y = t * 0.6;
                particles.forEach((p, idx) => {
                    p.rotation.x += 0.01 * (idx % 3 + 1);
                    p.rotation.y += 0.008 * (idx % 5 + 1);
                    p.position.y = Math.sin(t + idx) * 0.4 + (idx - 5) * 0.03;
                });
                renderer.render(scene, camera);
            }
            animate();

            function onResize() {
                const w = container.clientWidth || width;
                const h = container.clientHeight || height;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            }

            window.addEventListener('resize', onResize);
        }

        // Tail wag animation
        document.addEventListener('DOMContentLoaded', () => {
            const style = document.createElement('style');
            style.textContent = `
                @keyframes wag {
                    0%, 100% { transform: rotate(0deg); }
                    25% { transform: rotate(-15deg); }
                    75% { transform: rotate(15deg); }
                }
                .animate-wag {
                    animation: wag 0.6s ease-in-out infinite;
                    transform-origin: 130px 300px;
                }
                @keyframes sway {
                    0%, 100% { transform: translateX(0); }
                    50% { transform: translateX(5px); }
                }
                .animate-joy {
                    animation: sway 1s ease-in-out infinite;
                }
            `;
            document.head.appendChild(style);

            // WebSocket 初期化（Alpine.js 経由）
            setTimeout(() => {
                const app = document.querySelector('[x-data="elisiaChat()"]')?.__x?.$data;
                if (app && app.initializeWebSocket) {
                    app.initializeWebSocket();
                }
            }, 500);

            // Three.js エフェクト初期化
            initThreeOverlay();
        });
    </script>
</body>
